<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Register - Devjob Simulator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav>
        <div class="logo">Devjob Simulator</div>
    </nav>

    <div class="auth-container">
        <div class="auth-box">
            <h2 id="formTitle">Login to your account</h2>
            <form id="loginForm">
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required placeholder="developer@example.com">
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="********">
                </div>
                <button type="submit" id="submitBtn" class="btn" style="width: 100%;">Login</button>
            </form>
            <div class="auth-switch" id="authSwitch">
                Don't have an account? <span>Register</span>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
